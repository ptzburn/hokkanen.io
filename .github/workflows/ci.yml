name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.7

      - name: Install dependencies
        run: deno install

      - name: Format, lint, type-check
        run: deno task check

      - name: Run unit tests
        run: deno task test

      - name: Write build env
        run: |
          cat > .env.prod <<'EOF'
          NODE_ENV=production
          DATABASE_URL=http://localhost:8080
          DATABASE_AUTH_TOKEN=ci
          BETTER_AUTH_SECRET=ci_build_only_secret_value
          BETTER_AUTH_URL=https://example.com
          VITE_TURNSTILE_SITE_KEY=ci
          VITE_TURNSTILE_SECRET_KEY=ci
          VITE_HOST_URL=https://example.com
          S3_REGION=us-east-1
          S3_ENDPOINT=https://s3.example.com
          S3_ACCESS_KEY=ci
          S3_ACCESS_SECRET=ci
          S3_BUCKET=ci
          VITE_S3_PUBLIC_URL=https://cdn.example.com
          EOF

      - name: Build
        run: deno task build

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.7

      - name: Install dependencies
        run: deno install

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('deno.lock') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: deno task test:e2e:install

      - name: Install Playwright system deps
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: ./node_modules/.bin/playwright install-deps chromium

      - name: Run E2E tests
        run: deno task test:e2e
        env:
          CI: "true"

      - name: Upload Playwright report
        if: ${{ !cancelled() && failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7
